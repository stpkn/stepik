openapi: 3.0.3
info:
  title: Programming Course Platform MVP API
  version: 1.0.0
  description: Contracts derived from current UI prototypes and implemented frontend actions.
servers:
  - url: http://localhost:8000
    description: Local backend API
tags:
  - name: auth
    description: Authentication endpoints
paths:
  /login:
    post:
      tags: [auth]
      summary: User login from login screen
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Successful login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginSuccessResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
components:
  schemas:
    LoginRequest:
      type: object
      required: [login, password]
      properties:
        login:
          type: string
          minLength: 1
          example: student
        password:
          type: string
          minLength: 1
          example: password123
    LoginSuccessResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Successfully logged in as student
    ErrorResponse:
      type: object
      required: [detail]
      properties:
        detail:
          type: string
          example: Invalid login or password
